# ─── Nginx config: magento-mastery.com ───
# Secure headers for Hugo static site
# Deploy this in your server's sites-available/ or include block

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name magento-mastery.com www.magento-mastery.com;

    root /var/www/magento-mastery/public;
    index index.html;

    # ─── SSL (adjust paths to your certs) ───
    ssl_certificate     /etc/letsencrypt/live/magento-mastery.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magento-mastery.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── HSTS (was ❌) ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── X-Content-Type-Options (was ✅) ───
    add_header X-Content-Type-Options "nosniff" always;

    # ─── X-Frame-Options (was ✅) ───
    add_header X-Frame-Options "DENY" always;

    # ─── Referrer-Policy (was ✅) ───
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Permissions-Policy (was ❌) ───
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;

    # ─── Cross-Origin-Opener-Policy (was ❌) ───
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ─── Cross-Origin-Resource-Policy (was ❌) ───
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ─── Cross-Origin-Embedder-Policy (was ❌) ───
    # Using 'credentialless' instead of 'require-corp' because Google Fonts
    # (fonts.gstatic.com) and GA (googletagmanager.com) don't send CORP headers.
    # 'credentialless' still provides isolation without breaking external resources.
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # ─── Content-Security-Policy (was ❌) ───
    # Hashes generated from built Hugo output. Recompute after JS changes:
    #   hugo --minify
    #   grep -oP '<script>\K.*?(?=</script>)' public/index.html | while read l; do echo -n "$l" | sha256sum | base64; done
    # Main JS inline        sha256-FwzOHsSC4Wm6r5QuPYxwi43Gz90KLna4EDPQ2bvXz4c=
    # Analytics             sha256-u7R4ZQFfX4zFQd4EFLSuV8hYJMcU3nCuVMh/yCp32mQ=
    # copyPostLink          sha256-ORdbPSpB/3gJbX+a+kU7h8G4I+oIZ8ih0olncNi4Yi4=
    # Speculation rules     sha256-qyPstzicEPRIQiIWGItuWXzBOFypaP7gAvBvhYBVj6c=
    # onclick=copyPostLink  sha256-KjjH45ZPrObK/KtHzVT2LZzzAa966CutOjgXsLCotGs=
    # onload=this.media=... sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc=
    #
    # Note: 'unsafe-inline' for style-src because Hugo inlines the entire CSS.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-FwzOHsSC4Wm6r5QuPYxwi43Gz90KLna4EDPQ2bvXz4c=' 'sha256-u7R4ZQFfX4zFQd4EFLSuV8hYJMcU3nCuVMh/yCp32mQ=' 'sha256-ORdbPSpB/3gJbX+a+kU7h8G4I+oIZ8ih0olncNi4Yi4=' 'sha256-qyPstzicEPRIQiIWGItuWXzBOFypaP7gAvBvhYBVj6c=' 'unsafe-hashes' 'sha256-KjjH45ZPrObK/KtHzVT2LZzzAa966CutOjgXsLCotGs=' 'unsafe-hashes' 'sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc=' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; img-src 'self' data: https://www.googletagmanager.com; form-action 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # ─── Static files ───
    location / {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Versioned assets (fingerprinted by Hugo)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 365d;
        add_header Cache-Control "public, immutable, no-transform";
        add_header Access-Control-Allow-Origin "*";
        # Resource is same-origin, but fonts need ACAO for Google Fonts fallback
        # Remove COEP for static assets to allow cross-origin fonts
        add_header Cross-Origin-Resource-Policy "cross-origin";
    }

    # ─── Block access to sensitive files ───
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ~ (^|/)\.git {
        deny all;
        return 404;
    }

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;
}

# ─── HTTP → HTTPS redirect ───
server {
    listen 80;
    listen [::]:80;
    server_name magento-mastery.com www.magento-mastery.com;
    return 301 https://$host$request_uri;
}
