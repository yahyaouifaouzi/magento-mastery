baseURL = "https://www.magento-mastery.com/"
title = "Magento Mastery"
theme = "mastery"

[params]
  description = "Magento 2 specialist — custom modules, performance & e-commerce consulting"
  author = "Faouzi yahyaoui"
  darkModeDefault = true
  available = true   # false = "Currently fully booked"
  twitter     = "yahyaouifaouzi"
  googleAnalyticsID = "G-PXSV18RMC2"

[sitemap]
  changefreq = "weekly"
  priority   = 0.5

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Services"
    url = "/services/"
    weight = 2
  [[menu.main]]
    name = "Portfolio"
    url = "/portfolio/"
    weight = 3
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[permalinks]
  posts = "/blog/:slug/"

[minify]
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[frontmatter]
  lastmod = ["lastmod", ":git", "date"]

[outputs]
    home = ["HTML", "RSS", "LLMS"]

[outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true