<header class="site-header">

        <a href="/" class="nav-logo">

        <ul class="nav-links">
            
            <li>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
            <span class="icon-sun">☀️</span>
            <span class="icon-moon">🌙</span>
        </button>

        <button class="nav-burger" id="navBurger" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>
    </nav>
</header>

<main>
  
<div class="container" style="padding-top:4rem; padding-bottom:5rem;">

    <div class="section-header">
        <p class="section-label">// get in touch</p>
        <h1>Contact</h1>
        <p>Have a project in mind? Send me a message and I'll reply within 24 hours.</p>
    </div>

    <form
            class="contact-form"
            action="https://formspree.io/f/YOUR_FORM_ID"
            method="POST"
    >
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Project type or question">
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Describe your project..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self:flex-start;">Send Message →</button>
    </form>

</div>

</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 Magento Mastery · Built with Hugo</p>
        <p>
            <a href="mailto:contact@magento-mastery.com">contact@magento-mastery.com</a>
        </p>
    </div>
</footer>

<script src="/js/theme.js"></script>
</body>
