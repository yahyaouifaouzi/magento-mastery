{{ define "main" }}
<div class="container tag-page">

  <div class="page-header reveal">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="post-body">{{ . }}</div>{{ end }}
  </div>

  <div class="blog-list reveal-stagger">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="shell blog-item-link">
      <div class="shell__core blog-item">
        <div>
          <h3>{{ .LinkTitle }}</h3>
          {{ with .Summary }}<p class="blog-summary">{{ . }}</p>{{ end }}
        </div>
        <span class="blog-arrow">→</span>
      </div>
    </a>
    {{ end }}
  </div>

</div>
{{ end }}
