{{ if and (eq .Section "blog") (eq .Kind "page") }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ .Title | jsonify }},
    "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | plainify | jsonify }}{{ end }},
    "datePublished": "{{ if .Date.IsZero }}{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
    "dateModified": "{{ if .Lastmod.IsZero }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}",
    "url": "{{ .Permalink }}",
    "image": "{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "/images/og-default.jpg" | absURL }}{{ end }}",
    "author": {
        "@type": "Person",
        "name": "{{ site.Params.author }}",
        "url": "{{ site.BaseURL }}"
    },
    "publisher": {
        "@type": "Organization",
        "name": {{ site.Title | jsonify }},
        "url": "{{ site.BaseURL }}"
    },
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
    }
    {{ with .Params.tags }},
    "keywords": {{ . | jsonify }}
    {{ end }}
}
</script>
{{ else if .IsHome }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": {{ site.Title | jsonify }},
    "url": "{{ site.BaseURL }}",
    "description": {{ site.Params.description | jsonify }},
    "founder": {
        "@type": "Person",
        "name": "{{ site.Params.author }}"
    },
    "knowsAbout": ["Magento 2", "Adobe Commerce", "PHP", "E-commerce", "Custom Module Development"]
}
</script>
{{ else }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": {{ .Title | jsonify }},
    "url": "{{ .Permalink }}",
    "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ site.Params.description | jsonify }}{{ end }}
}
</script>
{{ end }}
