<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
    {{ with .Params.seo_title }}
    {{ . }}
    {{ else }}
    {{ .Title }}
    {{ end }}
</title>

<!-- Primary SEO -->
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify | truncate 160 }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
{{ if or (eq .Kind "taxonomy") (eq .Kind "term") }}<meta name="robots" content="noindex, follow">{{ else }}<meta name="robots" content="index, follow">{{ end }}
<link rel="canonical" href="{{ .Permalink }}">
<link rel="alternate" type="text/plain" href="/llms.txt" title="LLMs Description">
<link rel="alternate" type="application/rss+xml" href="{{ "/index.xml" | absURL }}" title="{{ site.Title }}">
<link rel="alternate" hreflang="en" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:type" content="{{ if and (eq .Section "blog") (eq .Kind "page") }}article{{ else }}website{{ end }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify | truncate 160 }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ site.Title }}">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "/images/og-default.jpg" | absURL }}{{ end }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ with .Params.image_alt }}{{ . }}{{ else }}{{ .Title }} — {{ site.Title }}{{ end }}">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify | truncate 160 }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
<meta name="twitter:image" content="{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "/images/og-default.jpg" | absURL }}{{ end }}">
{{ with site.Params.twitter }}<meta name="twitter:site" content="@{{ . }}">
<meta name="twitter:creator" content="@{{ . }}">{{ end }}

<!-- Article specific -->
{{ if and (eq .Section "blog") (eq .Kind "page") }}
<meta property="article:published_time" content="{{ if .Date.IsZero }}{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}">
<meta property="article:modified_time" content="{{ if .Lastmod.IsZero }}{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}{{ else }}{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}{{ end }}">
<meta property="article:author" content="{{ site.Params.author }}">
{{ with .Params.tags }}{{ range . }}<meta property="article:tag" content="{{ . }}">{{ end }}{{ end }}
{{ end }}

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#f97316">
