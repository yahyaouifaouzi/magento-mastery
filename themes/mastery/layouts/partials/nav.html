<header class="site-header" id="siteHeader">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <span>[</span><span class="nav-logo-accent">M</span><span>]</span>
      <span class="nav-logo-text">Mastery</span>
    </a>

    <ul class="nav-links" aria-label="Main navigation">
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} class="active"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>

    <button class="nav-burger" id="navBurger" aria-label="Open menu" aria-expanded="false" type="button">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<div class="nav-overlay" id="navOverlay">
  <ul class="nav-overlay-links">
    {{ range site.Menus.main }}
    <li>
      <a href="{{ .URL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} class="active"{{ end }}>
        {{ .Name }}
      </a>
    </li>
    {{ end }}
  </ul>
</div>
