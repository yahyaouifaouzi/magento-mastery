{{- $page := .page }}
{{- $taxonomy := .taxonomy }}
{{- with $page.GetTerms $taxonomy }}
  {{- $label := (index . 0).Parent.LinkTitle }}
  <div class="terms-tags-wrap">
    <span class="terms-tags-label">{{ $label }}</span>
    <div class="terms-tags">
      {{- range . }}
      <a href="{{ .RelPermalink }}" class="terms-tag">{{ .LinkTitle }}</a>
      {{- end }}
    </div>
  </div>
{{- end }}
