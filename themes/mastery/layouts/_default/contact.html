{{ define "main" }}
<div class="container" style="padding-top:4rem; padding-bottom:5rem;">

    <div class="section-header">
        <p class="section-label">// get in touch</p>
        <h1>Contact Magento Mastery — Get in Touch</h1>
        <p>Have a project in mind? Send me a message and I'll reply within 24 hours.</p>
    </div>

    <!-- Reverted back to standard WebMCP declarative attributes -->
    <form
            class="contact-form"
            action="https://formspree.io/f/YOUR_FORM_ID"
            method="POST"
            toolname="submit_contact_request"
            tooldescription="Submit a project inquiry to Magento Mastery"
    >

        <div class="form-group">
            <label for="name">Name</label>
            <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Your name"
                    toolparamtitle="Full Name"
                    toolparamdescription="The full name of the contact person"
                    required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    toolparamtitle="Email Address"
                    toolparamdescription="The email address to reply to"
                    required>
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Project type or question"
                    toolparamtitle="Inquiry Subject"
                    toolparamdescription="The main topic or project scope description">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea
                    id="message"
                    name="message"
                    placeholder="Describe your project..."
                    toolparamtitle="Message Body"
                    toolparamdescription="Detailed text explaining the project requirements, timelines, or questions"
                    required></textarea>
        </div>

        <button
                type="submit"
                class="btn btn-primary"
                style="align-self:flex-start;">
            Send Message →
        </button>

    </form>

</div>
{{ end }}
