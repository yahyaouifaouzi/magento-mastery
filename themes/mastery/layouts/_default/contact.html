{{ define "main" }}
<div class="container" style="padding-top:8rem;padding-bottom:5rem;">

  <div class="reveal" style="margin-bottom:3rem;">
    <span class="section-label">Get in touch</span>
    <h1 style="font-size:clamp(2rem,4vw,3rem);font-weight:700;letter-spacing:-0.03em;line-height:1.1;margin-bottom:0.75rem;">Contact Magento Mastery</h1>
    <p style="color:var(--text-2);max-width:480px;font-size:1.05rem;line-height:1.7;">Have a project in mind? Send me a message and I'll reply within 24 hours.</p>
  </div>

  <div class="shell" style="max-width:640px;">
    <div class="shell__core">
      <form
        class="contact-form"
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
        toolname="submit_contact_request"
        tooldescription="Submit a project inquiry to Magento Mastery"
      >

        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name"
            toolparamtitle="Full Name"
            toolparamdescription="The full name of the contact person"
            required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            toolparamtitle="Email Address"
            toolparamdescription="The email address to reply to"
            required>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input
            type="text"
            id="subject"
            name="subject"
            placeholder="Project type or question"
            toolparamtitle="Inquiry Subject"
            toolparamdescription="The main topic or project scope description">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Describe your project..."
            toolparamtitle="Message Body"
            toolparamdescription="Detailed text explaining the project requirements, timelines, or questions"
            required></textarea>
        </div>

        <button
          type="submit"
          class="btn btn--primary group"
          style="align-self:flex-start;">
          <span>Send Message</span>
          <span class="btn__icon">↗</span>
        </button>

      </form>
    </div>
  </div>

</div>
{{ end }}
