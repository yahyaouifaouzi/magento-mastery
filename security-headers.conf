# ─── Security Headers — include in your server block ───
# Generated for magento-mastery.com. Update CSP hashes after Hugo rebuild.
#
# Usage: include /etc/nginx/security-headers.conf;
#
# NOTE: If you also use this in a location block (e.g. static assets), you
# must ALSO include it server-level because nginx drops server-level
# add_header when a location has its own add_header directives.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "credentialless" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-FwzOHsSC4Wm6r5QuPYxwi43Gz90KLna4EDPQ2bvXz4c=' 'sha256-u7R4ZQFfX4zFQd4EFLSuV8hYJMcU3nCuVMh/yCp32mQ=' 'sha256-ORdbPSpB/3gJbX+a+kU7h8G4I+oIZ8ih0olncNi4Yi4=' 'sha256-qyPstzicEPRIQiIWGItuWXzBOFypaP7gAvBvhYBVj6c=' 'unsafe-hashes' 'sha256-KjjH45ZPrObK/KtHzVT2LZzzAa966CutOjgXsLCotGs=' 'unsafe-hashes' 'sha256-MhtPZXr7+LpJUY5qtMutB+qWfQtMaPccfe7QXtCcEYc=' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; img-src 'self' data: https://www.googletagmanager.com; form-action 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

# ─── Static asset note ───
# If you have a static assets location ~* \.(css|js|...), it MUST repeat ALL
# security headers above because nginx drops server-level add_header on any
# location that has its own add_header. Override these for static assets:
#   Cross-Origin-Resource-Policy: "cross-origin"
#   Access-Control-Allow-Origin: "*"
